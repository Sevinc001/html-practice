<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table>
        <caption>Student Grades</caption>
        <thead>
            <tr>
            <th scope="col">Name</th>
            <th scope="col">Surname</th>
            <th scope="col">Age</th>
            <th scope="col">Grade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ali</td>
                <td>Aliyev</td>
                <td>19</td>
                <td>89</td>
            </tr>
            <tr>
                <td>Sona</td>
                <td>Mansimova</td>
                <td>20</td>
                <td>91</td>
            </tr>
            <tr>
                <td>Cihad</td>
                <td>Gasimov</td>
                <td>19</td>
                <td>95</td>
            </tr>
            <tr>
                <td>Alsu</td>
                <td>Hasanli</td>
                <td>20</td>
                <td>82</td>
            </tr>

        </tbody>
        <tfoot>
            <tr>
                <th scope="row" colspan="3">Average grade:</th>
                <td>89.25</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
